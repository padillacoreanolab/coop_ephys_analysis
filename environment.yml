name: coop_ephys_env

channels:
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10.9
  - pip=24.3.1

  # Core scientific computing
  - numpy=1.26.4
  - scipy=1.14.1
  - pandas=2.2.3

  # Plotting and visualization
  - matplotlib=3.9.2
  - seaborn=0.13.2
  - pillow=11.0.0
  - matplotlib-venn=1.1.1

  # Machine learning / modeling
  - scikit-learn=1.6.1
  - xgboost=2.1.3

  # Jupyter workflow
  - jupyter=1.1.1
  - ipykernel=6.29.5
  - ipython=8.29.0

  # Data/config utilities
  - pyyaml=6.0.2
  - openpyxl=3.1.5
  - tqdm=4.67.1

  # Pip-only packages
  - pip:
      - spectral-connectivity==1.1.2